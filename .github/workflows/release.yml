name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            name: linux-x86_64
          - target: x86_64-unknown-linux-musl
            name: linux-x86_64-musl
          - target: aarch64-unknown-linux-gnu
            name: linux-aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install aarch64 cross tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package
        run: |
          cp target/${{ matrix.target }}/release/hidemylogs hidemylogs-${{ matrix.name }}
          sha256sum hidemylogs-${{ matrix.name }} > hidemylogs-${{ matrix.name }}.sha256

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: hidemylogs-${{ matrix.name }}
          path: |
            hidemylogs-${{ matrix.name }}
            hidemylogs-${{ matrix.name }}.sha256

  build-poly:
    name: Build poly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Polymorphic build
        run: |
          python3 scripts/polymorphic.py
          RUSTFLAGS="-Ccontrol-flow-guard=no -Cforce-frame-pointers=no" \
            cargo build --profile poly --target x86_64-unknown-linux-musl
          python3 scripts/polymorphic.py --revert

      - name: Package
        run: |
          cp target/x86_64-unknown-linux-musl/poly/hidemylogs hidemylogs-linux-x86_64-musl-poly
          sha256sum hidemylogs-linux-x86_64-musl-poly > hidemylogs-linux-x86_64-musl-poly.sha256

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: hidemylogs-linux-x86_64-musl-poly
          path: |
            hidemylogs-linux-x86_64-musl-poly
            hidemylogs-linux-x86_64-musl-poly.sha256

  release:
    name: Create Release
    needs: [build, build-poly]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: cat *.sha256 > checksums.sha256

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            hidemylogs-*
            checksums.sha256
          generate_release_notes: true
